# =============================================================================
# UniversalMind: RSI & Multi-Agent Coordination Research Framework
# =============================================================================
# Central configuration file. Copy to config.local.yaml for local overrides.

# --- Experiment Selection ---
experiment:
  name: "universe_dialogue"      # universe_dialogue | rsi_evolution | meta_rsi
  seed: 42
  output_dir: "./output"

# --- Universe Dialogue (Multi-Agent System) ---
universe_dialogue:
  enabled: true
  n_agents: 6
  env_size: 10
  n_steps: 50
  n_generations: 50
  n_trials: 1
  
  agent:
    policy_type: "simple"        # mlp | simple
    policy_hidden_dim: 16
    comm_dim: 4
    memory_size: 8
    use_memory: false
    learn_communication: true
  
  communication:
    channel_type: "vector"       # vector | discrete | attention
    vocab_size: 16
    message_length: 4
    attention_heads: 2
  
  task:
    type: "shared"               # individual | shared | mixed
    shared_goal_prob: 0.5
    reward_type: "shared"        # distance | shared | sparse | potential
    partitioned: true
    blind_ratio: 0.5

# --- RSI Evolution System ---
rsi_evolution:
  enabled: true
  n_systems: 20
  n_generations: 300
  mutation_rate: 0.5
  mutation_strength: 0.4
  selection: "truncation"
  tournament_size: 3
  elite_ratio: 0.15
  crossover_rate: 0.3
  coordination_bonus: 2.0
  mutation_decay: 0.998

# --- Metrics & Analysis ---
metrics:
  compute_mutual_information: true
  compute_synchronization: true
  compute_emergence: true
  track_entropy: true
  track_communication: true
  log_interval: 1

# --- Visualization ---
visualization:
  enabled: true
  plot_interval: 5
  save_plots: true
  plot_format: "png"
  dpi: 150

# --- Logging ---
logging:
  level: "INFO"
  save_trajectories: true
  save_communication_log: true
  save_metrics_csv: true
  save_generation_data: true
  log_interval: 1
  compress_old_runs: false

# --- Reproducibility ---
reproducibility:
  deterministic: true
  seed_evolution: true
  seed_environment: true
  seed_agents: true
